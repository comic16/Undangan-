<script>
  let userId = localStorage.getItem("userId")

if(!userId){
  userId = "user_" + Math.random().toString(36).substr(2,9)
  localStorage.setItem("userId", userId)
}
  document.body.classList.add("no-scroll")
const API_URL = "https://script.google.com/macros/s/AKfycbzHjy6GHPP4HfJr_fbO587eykL7bigXev2Jp4uVyzue0_nRt-OJAEr3DhH5QOd3pTruDA/exec"

// ELEMENT
const commentCount = document.getElementById("commentCount")
const likeBtn = document.getElementById("likeBtn")
const likeCount = document.getElementById("likeCount")
const commentInput = document.getElementById("commentInput")
const list = document.getElementById("list")
const commentBox = document.getElementById("commentBox")
const music = document.getElementById("music")
const musicBtn = document.getElementById("musicBtn")
const loginPage = document.getElementById("loginPage")
const namaLogin = document.getElementById("namaLogin")
const nama = document.getElementById("nama")
const namaClone = document.getElementById("namaClone")
const countdown = document.getElementById("countdown")

// STATUS
let sudahMasuk = false
let liked = false
let count = null

// ================= LOGIN =================
window.addEventListener("DOMContentLoaded", () => {
  const urlParams = new URLSearchParams(window.location.search)
  const namaDariLink = urlParams.get('to')

  if(namaDariLink){
    namaLogin.value = decodeURIComponent(namaDariLink)
  }
})

const savedNama = localStorage.getItem("namaTamu")
if(savedNama) namaLogin.value = savedNama

nama.innerText = "Tamu Undangan"
namaClone.innerText = "Tamu Undangan"

function masukUndangan(){
  const namaVal = namaLogin.value.trim()
  if(!namaVal) return showNotif("Isi nama kamu dulu")

  localStorage.setItem("namaTamu", namaVal)
document.body.classList.remove("no-scroll")
  loginPage.style.display = "none"
  nama.innerText = namaVal
  namaClone.innerText = namaVal
  sudahMasuk = true

  setTimeout(()=>{
    window.scrollTo({ top: window.innerHeight, behavior: "instant" })
  },50)

  music.volume = 0
  music.play().then(()=>{
    let v=0
    const fade=setInterval(()=>{
      v+=0.05
      if(v>=1){v=1;clearInterval(fade)}
      music.volume=v
    },100)
  })
}

// ================= COUNTDOWN =================
const target = new Date('April 19, 2026 00:00:00').getTime()

const elHari = document.getElementById("hari")
const elJam = document.getElementById("jam")
const elMenit = document.getElementById("menit")
const elDetik = document.getElementById("detik")

setInterval(()=>{
  const now = new Date().getTime()
  const gap = target - now

  if(gap <= 0){
    document.getElementById("countdownBox").innerHTML = "Hari Bahagia Telah Tiba ❤️"
    return
  }

  const hari = Math.floor(gap / (1000 * 60 * 60 * 24))
  const jam = Math.floor((gap / (1000 * 60 * 60)) % 24)
  const menit = Math.floor((gap / (1000 * 60)) % 60)
  const detik = Math.floor((gap / 1000) % 60)

  elHari.innerText = hari
  elJam.innerText = jam
  elMenit.innerText = menit
  elDetik.innerText = detik

},1000)

// ================= LOVE EFFECT =================
function spawnLoveBubble(){
  const el=document.createElement("div")
  el.innerText="❤️"
  el.className="loveBubble"

  el.style.left=Math.random()*window.innerWidth+"px"
  el.style.top=Math.random()*window.innerHeight+"px"

  const moveX=(Math.random()-0.5)*200
  const moveY=(Math.random()-0.5)*200

  el.style.setProperty('--x',moveX+'px')
  el.style.setProperty('--y',moveY+'px')

  el.style.fontSize=(Math.random()*25+15)+"px"

  document.body.appendChild(el)
  setTimeout(()=>el.remove(),2500)
}

// ================= LOAD LIKE =================
let isSendingLike = false
let lastLikeTotal = 0
let lastUserLiked = null

function loadLike(){
  if(isSendingLike) return // 🔥 biar tidak tabrakan saat klik

  fetch(API_URL+"?type=getLike&t="+Date.now())
  .then(res=>res.json())
  .then(data=>{

    const total = data.total || 0
    const users = data.users || []
    const isLikedServer = users.includes(userId)

    // 🔥 kalau jumlah sama → jangan update
    if(total === lastLikeTotal) return

    lastLikeTotal = total

    // 🔥 update UI
    likeCount.innerText = total

    if(isLikedServer){
      liked = true
      likeBtn.classList.add("active")
    }else{
      liked = false
      likeBtn.classList.remove("active")
    }

  })
}
loadLike()
setInterval(loadLike, 4000)
// ================= LIKE =================
likeBtn.onclick=()=>{
  liked = !liked
  isSendingLike = true // 🔥 LOCK

  let current = Number(likeCount.innerText) || 0

  if(liked){
    likeBtn.classList.add('active')
    likeCount.innerText = current + 1

    for(let i=0;i<15;i++){
      setTimeout(()=>spawnLoveBubble(), i*60)
    }

  }else{
    likeBtn.classList.remove('active')
    likeCount.innerText = current - 1
  }

  lastLikeTotal = Number(likeCount.innerText)
  lastUserLiked = liked

  fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:`type=setLike&userId=${userId}&value=${liked ? 1 : 0}`
  })
  .then(()=>{
  })
}

// ================= KOMENTAR =================
function sendComment(){
  const pesan = commentInput.value.trim()
  if(!pesan) return

  const namaUser = nama.innerText

  const d=document.createElement('div')
  d.style.padding="10px"
  d.style.borderBottom="1px solid #eee"

  d.innerHTML = `
    <b>${namaUser}</b>
    <div>${pesan}</div>
  `

  list.prepend(d)

  fetch(API_URL,{
    method:"POST",
    body: new URLSearchParams({
      type:"komentar",
      nama:namaUser,
      pesan:pesan
    })
  })

  commentInput.value=""
}

// ================= LOAD KOMENTAR =================
let lastTotal = 0

function loadKomentar(){
  fetch(API_URL+"?type=getKomentar&t="+Date.now())
  .then(res=>res.json())
  .then(data=>{

    // 🔥 kalau jumlah sama → jangan update
    if(data.length === lastTotal) return

    lastTotal = data.length

    // 🔥 baru update kalau ada perubahan
    list.innerHTML = ""
    commentCount.innerText = data.length

    data.reverse().forEach(item=>{
      const d=document.createElement('div')
      d.style.padding="10px"
      d.style.borderBottom="1px solid #eee"

      d.innerHTML = `
        <b>${item[0]}</b>
        <div>${item[1]}</div>
      `

      list.appendChild(d)
    })
  })
}

loadKomentar()
setInterval(loadKomentar, 2000)

// ================= UI =================
function openComment(){
  commentBox.style.bottom="0"

  // 🔥 tambah history (biar bisa back)
  history.pushState({comment:true}, "")
}
function closeComment(){
  commentBox.style.bottom="-100%"

  // 🔥 balik history (opsional biar rapi)
  if(history.state && history.state.comment){
    history.back()
  }
}
// 🔥 BACK BUTTON SUPPORT
window.addEventListener("popstate", function () {
  if(commentBox.style.bottom === "0px"){
    closeComment()
  }
})
function shareWA(){
  const namaUser = nama.innerText

  const link = window.location.origin + window.location.pathname + "?to=" + encodeURIComponent(namaUser)

  const pesan = `Assalamu'alaikum 🙏

Kami mengundang Anda untuk hadir di acara pernikahan kami:

💍 Hendri & Rahima

Berikut link undangannya:
${link}

Merupakan suatu kehormatan bagi kami jika Anda berkenan hadir ❤️`

  const url = "https://wa.me/?text=" + encodeURIComponent(pesan)

  window.open(url, "_blank")
}

// MUSIC TAP
document.body.addEventListener('click',(e)=>{
  if(!sudahMasuk) return
  if(e.target.closest('.btn')||e.target.closest('button')) return
  music.paused ? music.play() : music.pause()
})

musicBtn.onclick=()=>{
  if(!sudahMasuk) return
  music.paused ? music.play() : music.pause()
}

// OVERLAY
const overlay=document.getElementById('overlayPlay')

function updateOverlay(){
  overlay.style.opacity = music.paused ? '1':'0'
}

music.onplay=()=>{
  musicBtn.classList.add('rotate')
  updateOverlay()
}

music.onpause=()=>{
  musicBtn.classList.remove('rotate')
  updateOverlay()
}

updateOverlay()

// SCROLL LOOP
const sections=document.querySelectorAll('.section')
const total=sections.length
let isJumping=false

window.addEventListener('scroll',()=>{
  if(isJumping)return
  const y=Math.round(window.scrollY)
  const h=window.innerHeight

  if(y>=(total-1)*h-2)jumpTo(h)
  if(y<=2)jumpTo((total-2)*h)
})

function jumpTo(pos){
  isJumping=true
  document.documentElement.style.scrollSnapType="none"
  window.scrollTo({top:pos,behavior:"instant"})
  requestAnimationFrame(()=>{
    document.documentElement.style.scrollSnapType="y mandatory"
    isJumping=false
  })
}
// 🔥 JAGA MUSIK SAAT KEYBOARD MUNCUL
function paksaPlay(){
  if(sudahMasuk && music.paused){
    music.play().catch(()=>{})
  }
}

// saat fokus input
document.addEventListener("focusin", paksaPlay)

// saat klik input
document.addEventListener("click", (e)=>{
  if(e.target.tagName === "INPUT"){
    setTimeout(paksaPlay, 200)
  }
})

// saat resize (keyboard muncul)
window.addEventListener("resize", ()=>{
  setTimeout(paksaPlay, 300)
})

// saat kembali ke halaman
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    paksaPlay()
  }
})
function showNotif(text){
  const notif = document.getElementById("notif")
  notif.innerText = text

  notif.style.opacity = "1"
  notif.style.transform = "translateX(-50%) translateY(0)"

  setTimeout(()=>{
    notif.style.opacity = "0"
    notif.style.transform = "translateX(-50%) translateY(-20px)"
  },2000)
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    showNotif("Berhasil disalin: " + text)
  }).catch(()=>{
    showNotif("Gagal menyalin")
  })
}
// klik emoji
document.addEventListener("click", function(e){
  if(e.target.classList.contains("emoji")){
    commentInput.value += e.target.innerText + " "
    commentInput.focus()
  }

  // klik template
  if(e.target.classList.contains("template")){
    commentInput.value = e.target.innerText + " "
    commentInput.focus()
  }
})
</script>
